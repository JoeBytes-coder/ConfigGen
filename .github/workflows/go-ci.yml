name: Go CI

# 🎯 触发条件：main 分支 push 或任何 PR
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'  # 👈 根据你的项目需求修改版本

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests
        run: go test -v ./...

      - name: Build binary (optional)
        run: go build -o configgen ./cmd/configgen

      - name: Check for vulnerabilities (optional, requires gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -fmt=json -out=results.json ./...
          cat results.json
  release:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-go@v5
          with:
            go-version: '1.22'

        - name: Build for Linux
          run: GOOS=linux GOARCH=amd64 go build -o configgen-linux-amd64 .

        - name: Build for macOS
          run: GOOS=darwin GOARCH=amd64 go build -o configgen-macos-amd64 .

        - name: Upload binaries to Release
          uses: softprops/action-gh-release@v2
          with:
            files: |
                configgen-linux-amd64
                configgen-macos-amd64
                token: ${{ secrets.GITHUB_TOKEN }}  # GitHub 自动提供，无需配置